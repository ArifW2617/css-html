<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Advance</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .internal-box {
            background: #ffeaa7;
            padding: 15px;
            border: 2px dashed #d63031;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>CSS Advance</h1>

    <p style="text-align:center; color: #555;">
        ini adalah CSS Inline
    </p>

    <div class="card">
        <h2>Card</h2>
        <p>ini deksripsi dari card</p>
        <a class="btn" href="#">Tombol</a>
    </div>

    <div class="internal-box">
        Ini adalah box yang menggunakan internal CSS.
    </div>

    <h2 style="text-align:center;">Contoh Flexbox</h2>
    <div class="flex-container">
        <div class="card">Flex Item 1</div>
        <div class="card">Flex Item 2</div>
        <div class="card">Flex Item 3</div>
    </div>

    <h2 style="text-align:center;">Contoh Grid</h2>
    <div class="grid-container">
        <div class="card">Grid 1</div>
        <div class="card">Grid 2</div>
        <div class="card">Grid 3</div>
    </div>

</body>
</html>
